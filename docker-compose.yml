services:
  english-study:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: english-study-app
    ports:
      - "8501:8501"
    volumes:
      - db_volume:/app/src/db
      - st_volume:/app/src/.streamlit
      # Importante: Persistencia para modelos de IA (evita re-descargas)
      - hf_cache:/root/.cache/huggingface
      - kokoro_cache:/root/.cache/kokoro
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      # Importante: Forzar a las librerías a usar las rutas de los volúmenes
      - HF_HOME=/root/.cache/huggingface
    shm_size: '2gb' # IMPORTANTE para PyTorch y multiprocessing
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  db_volume:
  st_volume:
  hf_cache:      # Volumen para Transformers
  kokoro_cache:  # Volumen para Kokoro TTS